apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - prometheus.monitoring.svc.cluster.local:9090

      - job_name: backend
        metrics_path: /metrics
        static_configs:
          - targets:
              - backend.default.svc.cluster.local:4000

      - job_name: frontend
        metrics_path: /metrics
        static_configs:
          - targets:
              - frontend.default.svc.cluster.local:80

      - job_name: sonarqube
        metrics_path: /api/system/status
        static_configs:
          - targets:
              - sonarqube.monitoring.svc.cluster.local:9000
